spring:
  application:
    name: safe-meal-batch
  datasource:
    url: "${DATABASE_URL:jdbc:postgresql://localhost:5432/${POSTGRES_DB:safe_meal}}"
    username: "${POSTGRES_USER:safe_meal}"
    password: "${POSTGRES_PASSWORD:local-postgres-password}"
  rabbitmq:
    host: "${RABBITMQ_HOST:localhost}"
    port: "${RABBITMQ_PORT:5672}"
    username: "${RABBITMQ_DEFAULT_USER:safe_meal}"
    password: "${RABBITMQ_DEFAULT_PASS:local-rabbitmq-password}"
    publisher-confirm-type: correlated
    publisher-returns: true

safe-meal:
  neis:
    base-url: "${NEIS_BASE_URL:https://open.neis.go.kr/hub}"
    api-key: "${NEIS_API_KEY:}"
    meal:
      request-timeout: 5s
      max-payload-bytes: 1048576
      lease-duration: 2m
      max-attempts: 3
      initial-backoff: 200ms
      backoff-multiplier: 2.0
      circuit-breaker:
        failure-rate-threshold: 50
        sliding-window-size: 10
        minimum-calls: 5
        open-duration: 30s
  outbox:
    publisher:
      enabled: true
      batch-size: 100
      fixed-delay: 1000
  consumer:
    enabled: false
  rabbitmq:
    publisher-confirm-timeout: 5s
    events:
      exchange: safe-meal.events
      queue: safe-meal.events.worker
      routing-key: safe-meal.events
    retry:
      exchange: safe-meal.events.retry
      queue: safe-meal.events.retry.worker
      routing-key: safe-meal.events.retry
      delay: 1000
    dead-letter:
      exchange: safe-meal.events.dlx
      queue: safe-meal.events.dlq
      routing-key: safe-meal.events.dead
    max-retries: 3
  collection:
    run-once:
      enabled: false
    scheduler:
      enabled: "${SCHOOL_COLLECTION_SCHEDULER_ENABLED:true}"
      fixed-delay: "${SCHOOL_COLLECTION_SCHEDULER_FIXED_DELAY:PT1H}"
      days-ahead: "${SCHOOL_COLLECTION_SCHEDULER_DAYS_AHEAD:7}"
