spring.application.name=safe-meal-batch
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/${POSTGRES_DB:safe_meal}}
spring.datasource.username=${POSTGRES_USER:safe_meal}
spring.datasource.password=${POSTGRES_PASSWORD:change-me-postgres-password}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER:safe_meal}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS:change-me-rabbitmq-password}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
safe-meal.outbox.publisher.enabled=true
safe-meal.consumer.enabled=false
safe-meal.outbox.publisher.batch-size=100
safe-meal.outbox.publisher.fixed-delay=1000
safe-meal.rabbitmq.publisher-confirm-timeout=5s
safe-meal.rabbitmq.events.exchange=safe-meal.events
safe-meal.rabbitmq.events.queue=safe-meal.events.worker
safe-meal.rabbitmq.events.routing-key=safe-meal.events
safe-meal.rabbitmq.retry.exchange=safe-meal.events.retry
safe-meal.rabbitmq.retry.queue=safe-meal.events.retry.worker
safe-meal.rabbitmq.retry.routing-key=safe-meal.events.retry
safe-meal.rabbitmq.retry.delay=1000
safe-meal.rabbitmq.dead-letter.exchange=safe-meal.events.dlx
safe-meal.rabbitmq.dead-letter.queue=safe-meal.events.dlq
safe-meal.rabbitmq.dead-letter.routing-key=safe-meal.events.dead
safe-meal.rabbitmq.max-retries=3
