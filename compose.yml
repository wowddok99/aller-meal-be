services:
  aller-meal-postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aller_meal}
      POSTGRES_USER: ${POSTGRES_USER:-aller_meal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-postgres-password}
    ports:
      - "${POSTGRES_PUBLISHED_HOST:-127.0.0.1}:${POSTGRES_PUBLISHED_PORT:-5432}:5432"
    volumes:
      - aller-meal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  aller-meal-redis:
    image: redis:8.0.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PUBLISHED_HOST:-127.0.0.1}:${REDIS_PUBLISHED_PORT:-6379}:6379"
    volumes:
      - aller-meal-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  aller-meal-rabbitmq:
    image: rabbitmq:4.1.0-management-alpine
    hostname: aller-meal-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-aller_meal}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-local-rabbitmq-password}
    ports:
      - "${RABBITMQ_PUBLISHED_HOST:-127.0.0.1}:${RABBITMQ_AMQP_PUBLISHED_PORT:-5672}:5672"
      - "${RABBITMQ_PUBLISHED_HOST:-127.0.0.1}:${RABBITMQ_MANAGEMENT_PUBLISHED_PORT:-15672}:15672"
    volumes:
      - aller-meal-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  aller-meal-minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aller_meal}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-local-minio-password}
    ports:
      - "${MINIO_PUBLISHED_HOST:-127.0.0.1}:${MINIO_API_PUBLISHED_PORT:-9000}:9000"
      - "${MINIO_PUBLISHED_HOST:-127.0.0.1}:${MINIO_CONSOLE_PUBLISHED_PORT:-9001}:9001"
    volumes:
      - aller-meal-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  aller-meal-mailpit:
    image: axllent/mailpit:v1.26.0
    environment:
      MP_DATABASE: /data/mailpit.db
    ports:
      - "${MAILPIT_PUBLISHED_HOST:-127.0.0.1}:${MAILPIT_SMTP_PUBLISHED_PORT:-1025}:1025"
      - "${MAILPIT_PUBLISHED_HOST:-127.0.0.1}:${MAILPIT_WEB_PUBLISHED_PORT:-8025}:8025"
    volumes:
      - aller-meal-mailpit-data:/data
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  aller-meal-postgres-data:
  aller-meal-redis-data:
  aller-meal-rabbitmq-data:
  aller-meal-minio-data:
  aller-meal-mailpit-data:
