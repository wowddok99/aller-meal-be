spring:
  application:
    name: safe-meal-api
  datasource:
    url: "${DATABASE_URL:jdbc:postgresql://localhost:5432/${POSTGRES_DB:safe_meal}}"
    username: "${POSTGRES_USER:safe_meal}"
    password: "${POSTGRES_PASSWORD:local-postgres-password}"
  rabbitmq:
    host: "${RABBITMQ_HOST:localhost}"
    port: "${RABBITMQ_PORT:5672}"
    username: "${RABBITMQ_DEFAULT_USER:safe_meal}"
    password: "${RABBITMQ_DEFAULT_PASS:local-rabbitmq-password}"
    publisher-confirm-type: correlated
    publisher-returns: true
  data:
    redis:
      host: "${REDIS_HOST:localhost}"
      port: "${REDIS_PORT:6379}"
      connect-timeout: 500ms
      timeout: 500ms
  mail:
    host: "${SMTP_HOST:localhost}"
    port: "${SMTP_PORT:1025}"

safe-meal:
  auth:
    email-encryption-key: "${AUTH_EMAIL_ENCRYPTION_KEY}"
    email-encryption-key-version: "${AUTH_EMAIL_ENCRYPTION_KEY_VERSION:v1-local}"
    email-verification-token-ttl: "${EMAIL_VERIFICATION_TOKEN_TTL:30m}"
    email-verification-base-url: "${EMAIL_VERIFICATION_BASE_URL:http://localhost:8080/api/v1/auth/email-verifications/confirm?token=}"
    password-reset-token-ttl: "${PASSWORD_RESET_TOKEN_TTL:30m}"
    password-reset-base-url: "${PASSWORD_RESET_BASE_URL:http://localhost:8080/password-reset?token=}"
    email-from: "${AUTH_EMAIL_FROM:no-reply@allermeal.local}"
    password-hash-iterations: "${PASSWORD_HASH_ITERATIONS:210000}"
    access-token-signing-key: "${AUTH_ACCESS_TOKEN_SIGNING_KEY}"
    access-token-ttl: "${AUTH_ACCESS_TOKEN_TTL:15m}"
    refresh-token-ttl: "${AUTH_REFRESH_TOKEN_TTL:14d}"
    login-max-failures: "${AUTH_LOGIN_MAX_FAILURES:5}"
    login-failure-window: "${AUTH_LOGIN_FAILURE_WINDOW:15m}"
    login-lock-duration: "${AUTH_LOGIN_LOCK_DURATION:15m}"
    rate-limit-max-requests: "${AUTH_RATE_LIMIT_MAX_REQUESTS:20}"
    rate-limit-window: "${AUTH_RATE_LIMIT_WINDOW:1m}"
    allowed-origins: "${AUTH_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}"
  neis:
    base-url: "${NEIS_BASE_URL:https://open.neis.go.kr/hub}"
    api-key: "${NEIS_API_KEY:}"
    meal:
      request-timeout: 5s
      max-payload-bytes: 1048576
      lease-duration: 2m
      max-attempts: 3
      initial-backoff: 200ms
      backoff-multiplier: 2.0
      circuit-breaker:
        failure-rate-threshold: 50
        sliding-window-size: 10
        minimum-calls: 5
        open-duration: 30s
  outbox:
    publisher:
      enabled: false
      batch-size: 100
      fixed-delay: 1000
  consumer:
    enabled: false
  rabbitmq:
    publisher-confirm-timeout: 5s
    events:
      exchange: safe-meal.events
      queue: safe-meal.events.worker
      routing-key: safe-meal.events
    retry:
      exchange: safe-meal.events.retry
      queue: safe-meal.events.retry.worker
      routing-key: safe-meal.events.retry
      delay: 1000
    dead-letter:
      exchange: safe-meal.events.dlx
      queue: safe-meal.events.dlq
      routing-key: safe-meal.events.dead
    max-retries: 3
